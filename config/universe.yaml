# =============================================================================
# universe.yaml  --  evaluation grid (Part A2)
# -----------------------------------------------------------------------------
# 8 clean large-caps x last 4 COMPLETED fiscal years (annual), as of 2026-05-26.
# Calendar-year filers' FY2025 10-Ks were filed ~Feb 2026, so "last 4" =
# FY2022..FY2025. fiscal_year_end_month flags off-calendar names (AAPL Sep,
# PG Jun, WMT Jan) -- their FYxxxx label refers to the year the period ENDS in.
# cik is the zero-padded SEC CIK for EDGAR company-facts lookups (M4).
# =============================================================================

periods:
  kind: annual
  fiscal_years: [2022, 2023, 2024, 2025]

tickers:
  - symbol: AAPL
    name: Apple Inc.
    cik: "0000320193"
    fiscal_year_end_month: 9
